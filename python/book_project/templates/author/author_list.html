<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Author List</title>
<style>body{font-family:"Segoe UI",sans-serif;max-width:1000px;margin:40px auto}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background:#f4f4f4}</style>
</head>
<body>
  <h1>Author List</h1>
  <p><a href="/add_author/">Add Author</a> | <a href="/book_list/">Book List</a> | <a href="/publisher_list/">Publisher List</a></p>
  <table>
    <thead><tr><th>ID</th><th>Name</th><th>Books</th><th>Actions</th></tr></thead>
    <tbody>
      {% for a in author_obj_list %}
      <tr>
        <td>{{ a.id }}</td>
        <td>{{ a.name }}</td>
        <td>{% for b in a.book.all %}{{ b.name }}{% if not forloop.last %}, {% endif %}{% empty %}None{% endfor %}</td>
        <td><a href="/edit_author/?id={{ a.id }}">Edit</a> <a href="/delete_author/?id={{ a.id }}" onclick="return confirm('Delete this author?')">Delete</a></td>
      </tr>
      {% empty %}
      <tr><td colspan="4">No data.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
