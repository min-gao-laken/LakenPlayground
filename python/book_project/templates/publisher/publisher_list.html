<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Publisher List</title>
<style>body{font-family:"Segoe UI",sans-serif;max-width:900px;margin:40px auto}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background:#f4f4f4}</style>
</head>
<body>
  <h1>Publisher List</h1>
  <p><a href="/add_publisher/">Add Publisher</a> | <a href="/book_list/">Book List</a> | <a href="/author_list/">Author List</a></p>
  <table>
    <thead><tr><th>ID</th><th>Name</th><th>Address</th><th>Actions</th></tr></thead>
    <tbody>
      {% for p in publisher_obj_list %}
      <tr>
        <td>{{ p.id }}</td><td>{{ p.publisher_name }}</td><td>{{ p.publisher_address }}</td>
        <td><a href="/edit_publisher/?id={{ p.id }}">Edit</a> <a href="/delete_publisher/?id={{ p.id }}" onclick="return confirm('Delete this publisher?')">Delete</a></td>
      </tr>
      {% empty %}
      <tr><td colspan="4">No data.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
