<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Edit Publisher</title>
<style>body{font-family:"Segoe UI",sans-serif;max-width:720px;margin:40px auto}.row{margin-bottom:12px}label{display:inline-block;width:90px}input{padding:6px 8px;width:260px}.error{color:#b00020}</style>
</head>
<body>
  <h1>Edit Publisher</h1>
  <p><a href="/publisher_list/">Back to List</a></p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/edit_publisher/">{% csrf_token %}
    <input type="hidden" name="id" value="{{ publisher_obj.id }}" />
    <div class="row"><label>Name</label><input type="text" name="publisher_name" value="{{ publisher_obj.publisher_name }}" required /></div>
    <div class="row"><label>Address</label><input type="text" name="publisher_address" value="{{ publisher_obj.publisher_address }}" required /></div>
    <button type="submit">Save</button>
  </form>
</body>
</html>
